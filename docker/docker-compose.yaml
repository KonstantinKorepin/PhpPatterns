services:
  php:
    build:
      context: ./php
    container_name: patterns-php
    volumes:
      - ../:/app
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "${XDEBUG_CONFIG:-}"
      XDEBUG_SESSION: "${XDEBUG_SESSION:-}"
      PHP_IDE_CONFIG: "serverName=patterns"
    tty: true
    stdin_open: true
